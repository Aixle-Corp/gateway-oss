name: proto-stub-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  regenerate-and-diff:
    name: regenerate stubs and diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          version: '1.70.0'
          setup_only: true
      - name: buf lint
        working-directory: proto
        run: buf lint
      - name: regenerate stubs
        working-directory: proto
        run: |
          rm -rf gen
          buf generate
      - name: diff against committed stubs
        run: |
          if ! git diff --exit-code --stat -- proto/gen; then
            echo "::error::Generated proto stubs differ from committed stubs. Run 'cd proto && buf generate' locally and commit the result."
            exit 1
          fi
