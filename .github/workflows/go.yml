name: go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  unit:
    name: unit (go test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: go build ./...
      - run: go test -race -count=1 ./...

  fast-integration:
    name: fast-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: run integration-tagged tests
        run: go test -tags=integration -count=1 ./...
