name: python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: pip install --upgrade pip
      - run: pip install -e '.[dev]'
      - run: ruff check sdk/python

  typecheck:
    name: typecheck (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: pip install --upgrade pip
      - run: pip install -e '.[dev]'
      - run: mypy sdk/python/gateway_oss

  unit:
    name: unit (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: pip install --upgrade pip
      - run: pip install -e '.[dev]'
      - run: pytest sdk/python/tests

  fast-integration:
    name: fast-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: pip install --upgrade pip
      - run: pip install -e '.[dev]'
      - name: run integration-marked tests
        # exit code 5 = no tests collected; treat as success at MVP (no integration tests exist yet).
        shell: bash
        run: |
          set +e
          pytest sdk/python/tests -m integration
          code=$?
          if [ $code -eq 5 ]; then exit 0; fi
          exit $code
